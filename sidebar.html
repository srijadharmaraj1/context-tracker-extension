<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h2>Smart Dashboard</h2>
  <div>
    <button id="themeBtn">🌙</button>
    <button id="closeBtn">✖</button>
  </div>
</div>

<div class="card status">🟢 Tracking Active</div>

<div class="card">
  <textarea id="intentInput" placeholder="What are you doing here?"></textarea>
  <button id="saveIntent">Save Intent</button>
</div>

<div id="summary" class="card"></div>

<h3>Activity</h3>
<div id="graph" class="card"></div>

<h3>Insights</h3>
<div id="insights" class="card"></div>

<h3>Reminders</h3>
<div id="reminders" class="card"></div>

<h3>Daily Report</h3>
<div id="report" class="card"></div>

<h3>History</h3>
<div id="history" class="card"></div>

<script src="sidebar.js"></script>
</body>
</html>
